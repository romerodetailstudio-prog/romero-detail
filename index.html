<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romero Detail Studio</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
text-align:center;
}

/* fondo con logo */
.hero{
background-image:url("logo-bg.png");
background-size:cover;
background-position:center;
height:260px;
display:flex;
align-items:flex-end;
justify-content:center;
padding-bottom:20px;
}

/* capa oscura sobre el fondo */
.hero::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
height:260px;
background:rgba(0,0,0,0.65);
}

.title{
position:relative;
font-size:28px;
font-weight:bold;
color:#FFD000;
z-index:1;
}

.container{
max-width:500px;
margin:auto;
padding:25px;
}

.subtitle{
color:#cfcfcf;
margin-bottom:25px;
font-size:17px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
padding:18px;
margin:14px 0;
border-radius:14px;
text-decoration:none;
font-weight:bold;
font-size:16px;
transition:0.2s;
}

.btn:hover{
transform:scale(1.04);
}

.whatsapp{
background:#FFD000;
color:black;
}

.instagram{
background:#1a1a1a;
border:1px solid #333;
color:white;
}

.review{
background:#1a1a1a;
border:1px solid #333;
color:white;
}

.maps{
background:#1a1a1a;
border:1px solid #333;
color:white;
}

.icon{
font-size:20px;
}

.footer{
margin-top:25px;
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<div class="hero">
<div class="title">ROMERO DETAIL STUDIO</div>
</div>

<div class="container">

<div class="subtitle">
Estética Vehicular y Accesorios
</div>

<a class="btn whatsapp" href="https://wa.me/5493764531414?text=Hola%20quiero%20consultar%20por%20estetica%20vehicular">
<span class="icon">💬</span>
Consultar por WhatsApp
</a>

<a class="btn instagram" href="https://www.instagram.com/romeroycia_accesorios/">
<span class="icon">📸</span>
Ver trabajos en Instagram
</a>

<a class="btn review" href="https://maps.app.goo.gl/kv9zfBrGRkUR9yBm9">
<span class="icon">⭐</span>
Dejar una reseña
</a>

<a class="btn maps" href="https://maps.google.com/?q=Av.+17+de+Agosto+2216,+Posadas,+Misiones">
<span class="icon">📍</span>
Cómo llegar
</a>

<div class="footer">
Gracias por visitar Romero
</div>

</div>

</body>
</html>
