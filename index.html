<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romero Detail Studio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:black;
color:white;
text-align:center;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:30px 20px;
}

.logo{
width:100%;
max-width:420px;
margin-top:20px;
margin-bottom:10px;
}

.subtitle{
font-size:20px;
color:#ddd;
margin-bottom:30px;
}

.container{
max-width:420px;
margin:auto;
}

.btn{
display:flex;
align-items:center;
gap:15px;
padding:18px 22px;
margin:16px 0;
border-radius:14px;
text-decoration:none;
font-weight:bold;
font-size:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.5);
transition:0.2s;
}

.btn:hover{
transform:translateY(-3px);
}

.whatsapp{
background:#f4c430;
color:black;
}

.instagram{
background:linear-gradient(145deg,#1c1c1c,#2a2a2a);
color:white;
}

.review{
background:linear-gradient(145deg,#1c1c1c,#2a2a2a);
color:white;
}

.maps{
background:linear-gradient(145deg,#1c1c1c,#2a2a2a);
color:white;
}

.icon{
font-size:26px;
width:35px;
text-align:center;
}

.footer{
margin-top:40px;
color:#aaa;
}

</style>
</head>

<body>

<div class="overlay">

<img src="logo.png" class="logo">

<div class="subtitle">
Estética Vehicular y Accesorios
</div>

<div class="container">

<a class="btn whatsapp" href="https://wa.me/5493764531414?text=Hola%20quiero%20consultar%20por%20estetica%20vehicular">
<i class="fa-brands fa-whatsapp icon"></i>
Consultar por WhatsApp
</a>

<a class="btn instagram" href="https://www.instagram.com/romeroycia_accesorios/">
<i class="fa-brands fa-instagram icon"></i>
Ver trabajos en Instagram
</a>

<a class="btn review" href="https://maps.app.goo.gl/kv9zfBrGRkUR9yBm9">
<i class="fa-solid fa-star icon"></i>
Dejar una reseña en Google
</a>

<a class="btn maps" href="https://maps.google.com/?q=Av.+17+de+Agosto+2216,+Posadas,+Misiones">
<i class="fa-solid fa-location-dot icon"></i>
Cómo llegar al local
</a>

</div>

<div class="footer">
Gracias por visitar Romero Detail Studio
</div>

</div>

</body>
</html>
